<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>AI 每周新闻精选</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273449;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --green: #34d399;
      --yellow: #fbbf24;
      --pink: #f472b6;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      padding: 32px 20px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,.08) 0%, transparent 60%);
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .5px;
      position: relative;
    }
    header .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
    header .subtitle {
      font-size: 13px;
      opacity: .85;
      margin-top: 6px;
      position: relative;
    }
    header .badge {
      display: inline-block;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 11px;
      margin-top: 10px;
      position: relative;
      backdrop-filter: blur(4px);
    }

    /* ── Meta bar ── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-bar .dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── Filter tabs ── */
    .filter-wrap {
      padding: 14px 16px 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-wrap::-webkit-scrollbar { display: none; }
    .filter-tabs {
      display: flex;
      gap: 8px;
      white-space: nowrap;
    }
    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f172a;
    }

    /* ── News list ── */
    .news-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(.985); }

    .card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 0;
    }
    .category-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: .3px;
      flex-shrink: 0;
    }
    .cat-ai体育  { background: rgba(52,211,153,.15); color: #34d399; }
    .cat-ai应用  { background: rgba(56,189,248,.15); color: #38bdf8; }
    .cat-ai餐饮  { background: rgba(251,191,36,.15);  color: #fbbf24; }
    .cat-ai科技  { background: rgba(129,140,248,.15); color: #818cf8; }

    .card-num {
      margin-left: auto;
      font-size: 11px;
      color: var(--border);
      font-variant-numeric: tabular-nums;
    }

    .card-body { padding: 8px 14px 14px; }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 7px;
    }

    .card-summary {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-summary.expanded {
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 12px;
      border-top: 1px solid var(--border);
      gap: 8px;
    }
    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .card-source {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-info {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .likes {
      display: flex;
      align-items: center;
      gap: 3px;
      color: var(--pink);
      font-weight: 600;
    }

    .btn-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .btn-expand {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .btn-expand:active { background: var(--border); }
    .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty .icon { font-size: 40px; display: block; margin-bottom: 12px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px 20px 0;
      font-size: 11px;
      color: var(--border);
      line-height: 1.8;
    }
    footer a { color: var(--text-muted); text-decoration: none; }

    /* ── Loading ── */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <span class="emoji">🤖</span>
  <h1>AI 每周新闻精选</h1>
  <p class="subtitle">来自哔哩哔哩官方媒体 · 每周日更新</p>
  <span class="badge" id="weekLabel">加载中…</span>
</header>

<div class="meta-bar">
  <span><span class="dot"></span><span id="metaText">正在加载新闻数据…</span></span>
  <span id="metaDate"></span>
</div>

<div class="filter-wrap">
  <div class="filter-tabs" id="filterTabs">
    <button class="tab active" data-cat="全部">全部</button>
  </div>
</div>

<div id="newsList" class="news-list">
  <div class="loading"><div class="spinner"></div>加载中…</div>
</div>

<footer>
  内容来源：哔哩哔哩官方媒体账号<br/>
  每周日由 CatDesk 自动抓取更新<br/>
  <a href="https://github.com" target="_blank">GitHub Pages 托管</a>
</footer>

<script>
  let allNews = [];
  let currentCat = '全部';

  // 格式化点赞数
  function fmtLikes(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return n;
  }

  // 格式化日期
  function fmtDate(s) {
    const d = new Date(s);
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }

  // 获取分类 CSS class
  function catClass(cat) {
    return 'cat-' + cat.toLowerCase().replace(/\s+/g, '');
  }

  // 渲染新闻列表
  function render(cat) {
    currentCat = cat;
    const list = cat === '全部' ? allNews : allNews.filter(n => n.category === cat);
    const el = document.getElementById('newsList');

    if (!list.length) {
      el.innerHTML = '<div class="empty"><span class="icon">🔍</span>暂无该分类新闻</div>';
      return;
    }

    el.innerHTML = list.map((n, i) => `
      <div class="card" id="card-${n.id}">
        <div class="card-head">
          <span class="category-badge ${catClass(n.category)}">${n.category}</span>
          <span class="card-num">#${i + 1}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${n.title}</div>
          <div class="card-summary" id="summary-${n.id}">${n.summary}</div>
        </div>
        <div class="card-footer">
          <div class="card-meta">
            <span class="card-source">${n.source}</span>
            <div class="card-info">
              <span>${fmtDate(n.date)}</span>
              <span class="likes">❤️ ${fmtLikes(n.likes)}</span>
            </div>
          </div>
          <div class="btn-group">
            <button class="btn-expand" onclick="toggleExpand(${n.id}, this)">展开</button>
            <a class="btn-link" href="${n.url}" target="_blank" rel="noopener">
              B站 →
            </a>
          </div>
        </div>
      </div>
    `).join('');
  }

  // 展开/收起摘要
  function toggleExpand(id, btn) {
    const el = document.getElementById('summary-' + id);
    if (el.classList.contains('expanded')) {
      el.classList.remove('expanded');
      btn.textContent = '展开';
    } else {
      el.classList.add('expanded');
      btn.textContent = '收起';
    }
  }

  // 切换分类 tab
  function switchTab(cat) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.cat === cat);
    });
    render(cat);
  }

  // 加载数据
  async function loadNews() {
    try {
      const resp = await fetch('news.json?v=' + Date.now(), {cache: 'no-cache'});
      const data = await resp.json();
      allNews = data.news || [];

      // 更新 header 信息
      document.getElementById('weekLabel').textContent = data.week || '';
      document.getElementById('metaText').textContent = `共 ${allNews.length} 条新闻`;
      document.getElementById('metaDate').textContent = '更新于 ' + data.updated;

      // 生成分类 tabs
      const cats = ['全部', ...new Set(allNews.map(n => n.category))];
      const tabsEl = document.getElementById('filterTabs');
      tabsEl.innerHTML = cats.map(c =>
        `<button class="tab${c === '全部' ? ' active' : ''}" data-cat="${c}" onclick="switchTab('${c}')">${c}</button>`
      ).join('');

      render('全部');
    } catch (e) {
      document.getElementById('newsList').innerHTML =
        '<div class="empty"><span class="icon">⚠️</span>数据加载失败，请刷新重试</div>';
    }
  }

  loadNews();
</script>
</body>
</html>
